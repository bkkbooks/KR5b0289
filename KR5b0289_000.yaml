front:
  text: 上清六甲祈禱祕法五六昔時東華大帝上朝元始上帝太上道君老君玉帝紫微大帝皆聚㑹于丙寅宿胃天宫時東華帝君起立於衆聖之前曰臣有六甲天書三卷意欲流傳閻浮提世界受持行用切見未來世中刀兵凶亂黎民失業父子相離不能相救令傳上士受持行用佐國治亂驅使六甲六丁天遊十二溪女那延五天女共爲一部隂陽之神神通廣大位下三員大將各管鬼兵百萬今分爲三卷上呈按法以傳是時元始天尊省覽所陳付玄元老君流行于世厥後老君遂授尹喜先生傳於凡世老君廼還太清宫世人得受六甲天書自此始也從古至今抄冩多失六丁六甲之名及天遊十二溪女那延天女三元大將名號用之不神如得此書須憑本師上壇傳度方可行用也佐國治亂扶危救民疾苦九祖昇仙此書能使六甲六丁之神能召天遊十二溪女那延天女能使鬼兵三大將能使百萬鬼神能召風雲雷雨能破軍寨能使木牛木馬能使壁上畫人走動能令百草冬月放花能追地下鬼神及地下伏藏之寳能令行法人身飛千里萬里能辟水火刀兵能敵百萬之衆善射弓箭萬無一失能攝星月之神使之相見能召請五方帝君及三官五星降下凡所欲之物皆得如意也
