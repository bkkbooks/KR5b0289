body:
  text: 六甲陽神名甲子神字青公名元德甲戌神字林齊名虛逸甲申神字權𢖍名節略甲午神字子𡖖名潺仁甲辰神字袞昌名通元甲寅神字子靡名化石六甲隂神名丁卯神甲子旬中丁丑神甲戌旬中丁亥神甲申旬中丁酉神甲午旬中丁未神甲辰旬中丁巳神甲寅旬中六丁隂神名丁卯神名文伯字仁髙丁丑神名文公字仁賢丁亥神名仁通字仁和丁酉神名文𡖖字仁脩丁未神名昇通字仁恭丁巳神名𡖖字仁敬六甲神像可千變萬化或獨頭或三頭或一頭身披金甲或錦袍來降其神通不可犯各装束不同甲子青公元德眞君身着紅錦袍綵緑弔䪃金束帯身長二丈有一面赤色甲戌林齊逸虛眞君着緑袍馬皮弔䪃繫束帯身長二丈有一五目面如傅粉甲申權𢖍節略眞君着白葵花戰袍青皮弔䪃身長二丈有一三目面黄色六十甲子天書凡世人行六甲天文須召那延天女五人准東華大帝君摽名在六甲書内其五女神通廣大佐國治亂救度黎民若能達其大道當召請天上一切星辰來下降五那延天女聖名第一名天女字齊之名仁德第二名天女字揀之名仁雅第三名天女字罡之名仁錫第四名天女字眞之名仁賢第五名天女字實之名仁亮天女服色第一天女梳二髻有艶世之貌身長五尺三寸着紅衣繫仙裙手執文字下降第二天女梳兩髻身長五尺二寸着青衣繫仙裙手執文字下降第三天女有艶世之貌戴七星冠身長五尺三寸着白銷金衣繫仙裙手執文字下降第四天女有姿貌梳二髻身長五尺二寸着緑色雲鶴之衣手執仙菓下降第五天女有相貌戴天人冠身長五尺五寸着淡黄之衣手執仙花下降此五天女於甲子日祭之與十二溪女同日下降祭時念溪女神呪召請速現與人相見所求之事一一言使如意良乆回雲而去如後來再請不必甲子日但要見持六甲神印持六甲神呪二徧呼名立便見之或一二人來下降有金童子持眞餤之食與行法人食之溪女神呪魁罡魁罡奉九炁君降到六甲天書吾持六甲神印召請那延天女天遊十二溪女立赴壇前與吾朋友聞呼即至召之立便乗雲而來下降助吾法力用事急急如律令祭天女十二溪女法新蓆四領祭巾四條香花五菓清淨酒脯細茶糖餅油餅鹿脯細食白笋棗二升木耳共七十二分燈二十盞鏡子二面徑二尺三寸甲子日卯時入室焚香持六甲神印念六甲神呪五徧訖放印在香案上午時焚香又至亥時呼溪女名那延天女名取六甲神印印紙上五顆燒爲灰淨水調洗目右手執印向本日方而立在香案前聞異香满室便開目見十二溪女那延天女等並依位而坐即下拜低喏五聲點淨水捻香若溪女等言某人且坐不妨便坐言所求之事用此六甲神天女印牒神通甚大矣天女印即六甲印也此印用雷劈棗木心方員一尺於三元日或五月五日淨室中焚香雕刻念溪女呪五徧呼溪女名天女名祝罷於日午前刋畢放在香案上神女前供飬畢用栢木作匣盛之用羅錦袋之放在匣中當日神女前祭獻如要用取出用之此印神通不可思議能令萬事成就用印攝請五帝君日春用上元日夏用八節日秋用中元日冬用下元日於淨處或於本家門戸外寛作院墻洒掃如法潔淨勿令有糞穢鷄犬婦人須要遠去驢馬畜等類恐有聲犯也如法排辦寛遠帳幙陳設地上鋪竹簞二十領上更放新蓆二十領用條卓四條或卓子栢木牌位二十三箇菓五十楪燭十枝排兩下用髙臺點照及諸般花木置花瓶中獻細茶棗湯各十五盞素食二十五分手巾五條巾架兩座用二大盆盛水添滿放在兩下又別置卓子一隻用錦綉袱鋪上放六甲神印天女印並仰放於上淨水二盞并青詞展放卓子上鴉青紙一十二張青詞紙八張作五方帝君三官五星牌用朱砂新筆書五方帝君天地水府三官五星眞君名號套於牌子上依次第排列東方青帝九炁天君姓産名六字手公南方赤帝三炁天君姓溫名鐘字叟嫂西方白帝七炁天君姓彭名葉字照之北方黑帝五炁天君姓葛名賢字永郎中央黃帝一十二炁天君姓待名除字元都三官名上元九炁賜福天官中元七炁赦罪地官下元五炁解厄水官攝請五方星君東方木德歳星眞君南方火徳熒惑星君西方金德太白星君北方水德辰星眞君中央土德鎮星眞君右法用沉香一塊重二斤好大香爐或銀盆内立放旋旋火焼如法安排畢畫一星壇至二更初置燈四十九盞一更至二點㸃之行法人入戸閉門勿出只於門内暗處坐不得言語閉目鳴天皷叩齒五十二通漱咽津液不以多數至二更一點以來或有光暗處月明聞異香入門切不得言語不得着鞋而行恐有聲驚動輕行於牎子眼中望外觑之見五帝君各坐龍椅三官次坐龍椅上五星不坐或行或去見仙帝玉女數百餘人顏貌依稀各有所執不可說話見引進使者跪膝兩手捧青詞上星五帝君面前至二更四點忽然而去門外寂然無人匆令他人出門行持人只獨自出門先覷放印卓子有霞光五道上通徹天有丹藥五粒行持人頂禮五方訖取藥服之取盆中淨水不要潑了收藏蓋之然後收獻食果子茶湯不得與人食如不食傾在長流水中後收地上物色遺下金寳珍翠内有人間不識之寳搜尋有不獲之物四遠更㝷徧方位收拾餘物寳貨濟施貧寒之人不得非禮破用分作三分一分自身贍道一分設醮謝神一分施貧廣積功行於人間庶可以消此之物其雨盆淨水是受聖人真炁通靈沐浴自身即便身輕更服丹藥可爲在世神仙也驅使六甲六丁之神善使十二溪女那延天女驅使三員大將此水若不用沐浴放之淨處勿得棄置若至百日有靈變成甘露此水能治萬病如有年老髮白齒落耳聾日昏體瘦用此水洗頭便生黑髮齒落用此水嗽口再生細齒面皺重舒耳聾者用水滴耳中兩耳立聦有患眼人用此水洗目立便如舊再見光明若一切病患無藥可治者服此水二口立便安痊若傷刀中箭用此水洗瘡便無瘢痕也如人雕青先用布擦動青處用此水洗之立便不見痕跡若新死人用此水半盞灌下咽喉立便活也如有婦人懷孕服此水半盞是男聦明智慧是女端正有貌若有傷寒不汗但服此水一兩口即便汗出安痊若邪鬼着人法師遣不得者令患人服水一口更令行法人用水二口噀之其鬼通傳姓名要去便與清漿冷飯送之其鬼即去也如有惡瘡用此水洗之立便安也中毒藥者服此水立解此是天中衆聖返魂甘露水也行法人救治萬病切忌不得取人一文钱物若飮食之類無妨受人錢物即無功行也若能依戒必昇天仙召請五帝君三官五星欲求七祖生天或求丹藥服之用此壇三年二次請之不得常行請召上青六甲祈禱祕法
